<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp Pro - v2.5</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --white: #ffffff; --me: #dcf8c6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; height: 95vh; background: var(--white); box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; border-radius: 15px; overflow: hidden; position: relative; }
        
        /* Header */
        .header { background: var(--primary); color: white; padding: 12px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .profile-icon { font-size: 20px; background: rgba(255,255,255,0.2); padding: 5px 8px; border-radius: 50%; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 5px; cursor: pointer; padding: 5px 10px; font-size: 11px; }

        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; position: relative; }
        .hidden { display: none !important; }

        input { padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; transition: 0.2s; margin-top: 5px; }
        button:active { transform: scale(0.98); }
        .text-link { background: none; color: var(--primary); font-size: 13px; margin-top: 10px; text-decoration: underline; padding: 0; font-weight: normal; }

        /* Contacts UI */
        #list-kontak { display: flex; flex-direction: column; }
        .contact-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; order: 999; }
        .contact-item:hover { background: #f9f9f9; }
        .avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; margin-right: 12px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .contact-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        
        .last-msg { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .last-msg.is-unread { font-weight: 800; color: #000; }

        /* Badge Bulat Biru */
        .unread-badge { 
            background-color: var(--primary); 
            color: white; 
            font-size: 11px; 
            font-weight: bold; 
            min-width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2px;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .badge-hidden { display: none; }

        /* Floating Button */
        .fab { position: absolute; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; border: none; }

        /* Chat Room UI */
        #messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background: #e5ddd5; }
        .bubble { padding: 8px 12px; border-radius: 12px; margin-bottom: 5px; max-width: 80%; font-size: 14px; word-wrap: break-word; position: relative; padding-bottom: 18px; }
        .bubble.me { align-self: flex-end; background: var(--me); border-bottom-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        
        .status-dot { position: absolute; bottom: 4px; right: 8px; width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .unread { background-color: #ccc; } 
        .read { background-color: var(--primary); }

        .chat-input-area { padding: 10px; background: white; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ddd; }
        #input-msg { flex: 1; margin: 0; border-radius: 20px; padding: 10px 15px; }
        #btn-send { width: 45px; height: 45px; margin: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .err-txt { color:red; font-size:12px; text-align:center; margin-top: 10px; min-height: 15px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="app-header" class="header hidden">
            <div class="header-left" id="btn-open-profile">
                <span class="profile-icon">👤</span>
                <span id="header-user">@user</span>
            </div>
            <button class="logout-btn" id="btn-logout">LOGOUT</button>
        </div>

        <div id="login-screen" class="screen">
            <h2 style="text-align:center">Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button id="btn-login-exec">Masuk</button>
            <button id="btn-goto-signup" style="background:#34a853">Daftar Akun Baru</button>
            <p id="login-error" class="err-txt"></p>
        </div>

        <div id="signup-screen" class="screen hidden">
            <h2 style="text-align:center">Daftar Akun</h2>
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-pass" placeholder="Password (min 6 karakter)">
            <button id="btn-signup-exec">Daftar Sekarang</button>
            <button id="btn-back-login" class="text-link">Kembali ke Login</button>
            <p id="signup-error" class="err-txt"></p>
        </div>

        <div id="setup-screen" class="screen hidden">
            <h3>Set ID Kamu</h3>
            <input type="text" id="custom-username" placeholder="Contoh: budi_chat">
            <button id="btn-save-profile">Simpan Profil</button>
        </div>

        <div id="contact-screen" class="screen hidden">
            <h3 style="margin-top:0">Daftar Chat</h3>
            <div id="list-kontak"></div>
            <button class="fab" id="btn-open-add-contact">+</button>
        </div>

        <div id="add-contact-screen" class="screen hidden">
            <h3>Tambah Kontak</h3>
            <input type="text" id="search-friend-id" placeholder="Masukkan ID Teman">
            <button id="btn-add-friend">Cari & Tambah</button>
            <button id="btn-cancel-add" class="text-link">Batal</button>
        </div>

        <div id="chat-screen" class="screen hidden" style="padding:0">
            <div style="background:#eee; padding:10px; font-weight:bold; display:flex; align-items:center; gap:10px; border-bottom: 1px solid #ddd;">
                <button id="btn-back" style="background:none; color:blue; width:auto; padding:5px; margin:0">< Kembali</button>
                <span id="chat-with-id">@username</span>
            </div>
            <div id="messages-area"></div>
            <div class="chat-input-area">
                <input type="text" id="input-msg" placeholder="Tulis pesan..." autocomplete="off">
                <button id="btn-send">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getDatabase, ref, set, get, update, push, onChildAdded, onValue, serverTimestamp, query, orderByChild, equalTo, off } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPXhs0feUYRm_KSzK3YdlKrsgFcSDRpX4",
            authDomain: "chattingapp-8734b.firebaseapp.com",
            databaseURL: "https://chattingapp-8734b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chattingapp-8734b",
            storageBucket: "chattingapp-8734b.firebasestorage.app",
            messagingSenderId: "811918487671",
            appId: "1:811918487671:web:060e9b245e843410525672"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let myData = null;
        let activeRoomId = null;
        let activeListeners = {}; // Penampung listener room kontak

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                if (snap.exists()) {
                    myData = snap.val();
                    document.getElementById('header-user').innerText = "@" + myData.username;
                    showScreen('contact-screen');
                    loadMyContacts();
                } else { showScreen('setup-screen'); }
                document.getElementById('app-header').classList.remove('hidden');
            } else {
                showScreen('login-screen');
                document.getElementById('app-header').classList.add('hidden');
            }
        });

        // --- AUTH ACTIONS ---
        document.getElementById('btn-login-exec').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { document.getElementById('login-error').innerText = "Login Gagal!"; }
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('btn-save-profile').onclick = async () => {
            const userIn = document.getElementById('custom-username').value.trim().toLowerCase();
            if(!userIn) return;
            myData = { uid: auth.currentUser.uid, username: userIn, email: auth.currentUser.email };
            await set(ref(db, 'users/' + auth.currentUser.uid), myData);
            showScreen('contact-screen');
        };

        // --- CONTACTS LOGIC (STABLE VERSION) ---
        function loadMyContacts() {
            const list = document.getElementById('list-kontak');
            const contactRef = ref(db, 'contacts/' + myData.uid);

            // Bersihkan listener lama
            off(contactRef);
            Object.values(activeListeners).forEach(r => off(r));
            activeListeners = {};

            onValue(contactRef, (snap) => {
                list.innerHTML = "";
                if(!snap.exists()) return;

                Object.values(snap.val()).forEach(friend => {
                    const roomId = myData.uid < friend.uid ? myData.uid+"_"+friend.uid : friend.uid+"_"+myData.uid;
                    
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.id = 'contact-' + friend.uid;
                    div.innerHTML = `
                        <div class="avatar">${friend.username[0].toUpperCase()}</div>
                        <div class="contact-info">
                            <b>@${friend.username}</b>
                            <span class="last-msg" id="last-msg-${roomId}">Belum ada pesan</span>
                        </div>
                        <div class="unread-badge badge-hidden" id="badge-${roomId}">0</div>
                    `;
                    div.onclick = () => startChat(friend);
                    list.appendChild(div);

                    // Listener untuk pesan terakhir & badge
                    const msgRoomRef = ref(db, 'messages/' + roomId);
                    activeListeners[roomId] = msgRoomRef;

                    onValue(msgRoomRef, (mSnap) => {
                        const lastMsgEl = document.getElementById('last-msg-' + roomId);
                        const badgeEl = document.getElementById('badge-' + roomId);
                        const contactDiv = document.getElementById('contact-' + friend.uid);
                        
                        if(!lastMsgEl || !badgeEl) return;

                        if(mSnap.exists()) {
                            const msgs = Object.values(mSnap.val());
                            const lastData = msgs[msgs.length - 1];
                            
                            lastMsgEl.innerText = lastData.text;

                            // Hitung unread dari lawan
                            const unreadCount = msgs.filter(m => m.sender !== myData.uid && m.status === 'unread').length;
                            
                            if(unreadCount > 0) {
                                badgeEl.innerText = unreadCount;
                                badgeEl.classList.remove('badge-hidden');
                                lastMsgEl.classList.add('is-unread');
                            } else {
                                badgeEl.classList.add('badge-hidden');
                                lastMsgEl.classList.remove('is-unread');
                            }

                            // Sorting (Terbaru di atas)
                            if(lastData.time) contactDiv.style.order = -Math.floor(lastData.time);
                        }
                    });
                });
            });
        }

        // --- CHAT ENGINE ---
        function startChat(friend) {
            activeRoomId = myData.uid < friend.uid ? myData.uid+"_"+friend.uid : friend.uid+"_"+myData.uid;
            showScreen('chat-screen');
            document.getElementById('chat-with-id').innerText = "@" + friend.username;
            const area = document.getElementById('messages-area');
            area.innerHTML = "";
            
            const msgRef = ref(db, 'messages/' + activeRoomId);
            off(msgRef); // Clean chat listener

            onChildAdded(msgRef, (snap) => {
                const m = snap.val();
                const mId = snap.key;

                // Tandai dibaca jika kita yang buka
                if(m.sender !== myData.uid && m.status === 'unread') {
                    update(ref(db, `messages/${activeRoomId}/${mId}`), { status: 'read' });
                }

                const div = document.createElement('div');
                div.className = `bubble ${m.sender === myData.uid ? 'me' : 'them'}`;
                div.innerHTML = `${m.text}<div class="status-dot ${m.status === 'read' ? 'read' : 'unread'}" id="status-${mId}"></div>`;
                area.appendChild(div);
                area.scrollTop = area.scrollHeight;

                // Watch status changes (untuk centang biru di pengirim)
                onValue(ref(db, `messages/${activeRoomId}/${mId}/status`), (sSnap) => {
                    const dot = document.getElementById('status-' + mId);
                    if(dot) dot.className = `status-dot ${sSnap.val() === 'read' ? 'read' : 'unread'}`;
                });
            });
        }

        const sendMessage = async () => {
            const inp = document.getElementById('input-msg');
            const txt = inp.value.trim();
            if(!txt || !activeRoomId) return;
            inp.value = "";
            await push(ref(db, 'messages/' + activeRoomId), { 
                sender: myData.uid, text: txt, 
                time: serverTimestamp(), status: 'unread' 
            });
        };

        // --- EVENT HANDLERS ---
        document.getElementById('btn-send').onclick = sendMessage;
        document.getElementById('input-msg').onkeypress = (e) => { if(e.key==='Enter') sendMessage(); };
        document.getElementById('btn-back').onclick = () => showScreen('contact-screen');
        document.getElementById('btn-goto-signup').onclick = () => showScreen('signup-screen');
        document.getElementById('btn-back-login').onclick = () => showScreen('login-screen');
        document.getElementById('btn-open-add-contact').onclick = () => showScreen('add-contact-screen');
        document.getElementById('btn-cancel-add').onclick = () => showScreen('contact-screen');

        document.getElementById('btn-add-friend').onclick = async () => {
            const target = document.getElementById('search-friend-id').value.trim().toLowerCase();
            const q = query(ref(db, 'users'), orderByChild('username'), equalTo(target));
            const snap = await get(q);
            if(snap.exists()) {
                const friend = Object.values(snap.val())[0];
                if(friend.uid === myData.uid) return alert("Gak bisa tambah diri sendiri!");
                await set(ref(db, `contacts/${myData.uid}/${friend.uid}`), friend);
                showScreen('contact-screen');
            } else { alert("User tidak ditemukan!"); }
        };
    </script>
</body>
</html>
